<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lista VIP - v28 AutoSearch</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
    <style>
        :root { --p: #6366f1; --s: #22c55e; --bg: #f1f5f9; --c: #ffffff; --text: #1e293b; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; display: flex; justify-content: center; }
        .app-container { background: var(--c); padding: 15px; border-radius: 20px; width: 100%; max-width: 600px; min-height: 95vh; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .screen { display: none; } .screen.active { display: block; }
        input, select { padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 16px; width: 100%; margin-bottom: 8px; box-sizing: border-box; }
        .btn { border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-p { background: var(--p); color: white; width: 100%; }
        .btn-scan { background: #334155; color: white; width: 100%; margin-bottom: 10px; }
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); display:none; align-items:center; justify-content:center; z-index: 10000; }
        .modal-content { background:white; padding:20px; border-radius:15px; width:90%; max-width:450px; position: relative; max-height: 85vh; overflow-y: auto; }
        #interactive.viewport { width: 100%; height: 300px; position: relative; overflow: hidden; background: #000; }
        .scan-guide { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80%; height: 120px; border: 2px solid #fff; border-radius: 8px; z-index: 20; box-shadow: 0 0 0 1000px rgba(0,0,0,0.5); }
        .item-row { border-bottom: 2px solid #f1f5f9; padding: 12px 0; }
        .calc-grid { display: grid; grid-template-columns: 30px 1.2fr 1fr 1fr 1fr; gap: 5px; align-items: center; font-size: 0.8rem; }
        .mini-input { padding: 6px; font-size: 0.85rem; border: 1px solid #e2e8f0; border-radius: 4px; text-align: right; width: 100%; }
        .footer-summary { position: sticky; bottom: 0; background: white; padding: 15px; border-top: 2px solid #e2e8f0; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .loading-text { color: var(--p); font-size: 12px; font-weight: bold; display: none; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="screenHome" class="screen active">
        <h2 style="text-align:center">🛒 Lista VIP v28</h2>
        <input type="text" id="novaListaNome" placeholder="Nome da Lista">
        <button class="btn btn-p" onclick="criarNovaLista()">Criar Nova Lista</button>
        <div id="listaDeArquivos" style="margin-top:20px;"></div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:20px;">
            <button class="btn btn-scan" onclick="abrirModalCatalogo()" style="grid-column: span 2;">📦 Catálogo</button>
            <button class="btn" style="background:#e2e8f0" onclick="abrirModalCats()">⚙️ Categorias</button>
            <button class="btn" style="background:#f1f5f9" onclick="exportarBackup()">📤 Backup</button>
            <button class="btn" style="background:#f1f5f9; grid-column: span 2;" onclick="importarBackup()">📥 Restaurar</button>
        </div>
    </div>

    <div id="screenEditor" class="screen">
        <button class="btn" onclick="irParaHome()">← Voltar</button>
        <h3 id="tituloListaAtual"></h3>
        <div style="background:#f8fafc; padding:15px; border-radius:12px; border:1px solid #e2e8f0;">
            <button class="btn btn-scan" onclick="iniciarLeitor('lista')">📸 Scanear</button>
            <div id="loadLista" class="loading-text">🔍 Buscando produto...</div>
            <input type="number" id="prodEan" placeholder="Código de Barras" oninput="autoPreencher(this.value, 'lista')">
            <input type="text" id="prodNome" placeholder="Nome do Produto">
            <div style="display:grid; grid-template-columns: 1.5fr 1fr 1.2fr; gap:8px;">
                <select id="prodCatSelect"></select>
                <input type="number" id="prodQtdP" value="1">
                <input type="number" id="prodValP" placeholder="R$">
            </div>
            <button class="btn btn-p" onclick="adicionarItem()" style="margin-top:10px; width:100%">Adicionar</button>
        </div>
        <div id="corpoLista"></div>
        <div class="footer-summary">
            <div><small>PREVISTO</small><br><b id="totalPrevisto">R$ 0.00</b></div>
            <div style="color:var(--s)"><small>REAL</small><br><b id="totalReal">R$ 0.00</b></div>
        </div>
    </div>
</div>

<div id="modalScanner" class="modal">
    <div id="interactive" class="viewport"><div class="scan-guide"></div></div>
    <button class="btn" style="position:absolute; bottom:20px; background:#ef4444; color:#fff" onclick="pararLeitor()">Fechar</button>
</div>

<div id="modalCatalogo" class="modal">
    <div class="modal-content">
        <h3>📦 Catálogo</h3>
        <button class="btn btn-scan" onclick="iniciarLeitor('catalogo')">📸 Scanear</button>
        <div id="loadCat" class="loading-text">🔍 Buscando...</div>
        <input type="number" id="catEan" placeholder="EAN" oninput="autoPreencher(this.value, 'catalogo')">
        <input type="text" id="catNome" placeholder="Nome">
        <select id="catCatSelect"></select>
        <input type="number" id="catPreco" placeholder="Preço R$">
        <button class="btn btn-p" onclick="salvarNoCatalogo()">Salvar</button>
        <div id="listaItensCatalogo" style="margin-top:10px;"></div>
        <button class="btn" style="width:100%; margin-top:10px; background:#ddd" onclick="fecharModalCatalogo()">Fechar</button>
    </div>
</div>

<div id="modalCats" class="modal">
    <div class="modal-content">
        <h3>⚙️ Categorias</h3>
        <div id="listaCategoriasEdicao"></div>
        <button class="btn" style="width:100%; margin-top:15px; background:#ddd" onclick="document.getElementById('modalCats').style.display='none'">Fechar</button>
    </div>
</div>

<script>
    const KEY = 'app_v26_storage';
    const CATS = ["🛒 Mercearia", "🍎 Hortifruti", "🥩 Açougue", "🥖 Padaria", "🧀 Frios/Laticínios", "❄️ Congelados", "🥤 Bebidas", "🧼 Higiene", "🧹 Limpeza", "🏠 Utilidades Domésticas", "🐾 Pet Shop", "👧 Lanche Crianças", "📦 Outros"];
    let appData = JSON.parse(localStorage.getItem(KEY)) || { listas: {}, categorias: CATS, catalogo: {} };
    let listaAtiva = null;

    function salvar() { localStorage.setItem(KEY, JSON.stringify(appData)); }

    async function buscarEanOnline(ean, contexto) {
        if (ean.length !== 8 && ean.length !== 13) return;
        const loader = contexto === 'lista' ? document.getElementById('loadLista') : document.getElementById('loadCat');
        const campoNome = contexto === 'lista' ? document.getElementById('prodNome') : document.getElementById('catNome');
        
        loader.style.display = 'block';
        try {
            const res = await fetch(`https://world.openfoodfacts.org/api/v0/product/${ean}.json`);
            const data = await res.json();
            if (data.status === 1) {
                campoNome.value = data.product.product_name || data.product.generic_name || "Produto não nomeado";
            }
        } catch (e) { console.error("Erro na busca"); }
        loader.style.display = 'none';
    }

    function autoPreencher(ean, contexto) {
        if (!ean) return;
        // 1. Busca no Catálogo Local primeiro
        const item = appData.catalogo[ean];
        const prefix = contexto === 'lista' ? 'prod' : 'cat';
        
        if (item) {
            document.getElementById(prefix+'Nome').value = item.nome;
            const precoCampo = document.getElementById(prefix+'ValP') || document.getElementById(prefix+'Preco');
            if(precoCampo) precoCampo.value = item.preco;
            document.getElementById(prefix+'CatSelect').value = item.categoria;
        } else {
            // 2. Se não achar local, busca na Web (apenas se tiver tamanho de EAN)
            if (ean.length === 8 || ean.length === 13) {
                buscarEanOnline(ean, contexto);
            }
        }
    }

    function iniciarLeitor(alvo) {
        scannerAlvo = alvo;
        document.getElementById('modalScanner').style.display = 'flex';
        Quagga.init({
            inputStream: { name: "Live", type: "LiveStream", target: document.querySelector('#interactive'), constraints: { facingMode: "environment" } },
            decoder: { readers: ["ean_reader", "ean_8_reader"] }
        }, (err) => { if (!err) Quagga.start(); });

        let lastResult = null;
        let count = 0;
        Quagga.onDetected(res => {
            const code = res.codeResult.code;
            if (code === lastResult) { count++; } else { lastResult = code; count = 0; }
            if (count >= 3) {
                if (navigator.vibrate) navigator.vibrate(100);
                pararLeitor();
                const campoId = scannerAlvo === 'lista' ? 'prodEan' : 'catEan';
                document.getElementById(campoId).value = code;
                autoPreencher(code, scannerAlvo);
            }
        });
    }

    function pararLeitor() { Quagga.stop(); document.getElementById('modalScanner').style.display = 'none'; }

    function criarNovaLista() {
        const n = document.getElementById('novaListaNome').value.trim();
        if(n) { appData.listas[n] = []; salvar(); renderHome(); abrirLista(n); document.getElementById('novaListaNome').value = ""; }
    }

    function abrirLista(id) {
        listaAtiva = id;
        document.getElementById('screenHome').classList.remove('active');
        document.getElementById('screenEditor').classList.add('active');
        document.getElementById('tituloListaAtual').innerText = id;
        document.getElementById('prodCatSelect').innerHTML = appData.categorias.map(c => `<option value="${c}">${c}</option>`).join('');
        renderItens();
    }

    function adicionarItem() {
        const nome = document.getElementById('prodNome').value;
        if(!nome) return;
        appData.listas[listaAtiva].push({
            nome, ean: document.getElementById('prodEan').value, cat: document.getElementById('prodCatSelect').value,
            qtdP: parseFloat(document.getElementById('prodQtdP').value) || 1,
            valP: parseFloat(document.getElementById('prodValP').value) || 0,
            qtdR: parseFloat(document.getElementById('prodQtdP').value) || 1,
            valR: 0, noCarrinho: false
        });
        salvar(); renderItens();
        document.getElementById('prodNome').value = ""; document.getElementById('prodEan').value = ""; document.getElementById('prodValP').value = "";
    }

    function renderItens() {
        const container = document.getElementById('corpoLista'); container.innerHTML = "";
        const itens = appData.listas[listaAtiva] || [];
        const cats = [...new Set(itens.map(i => i.cat))];
        cats.forEach(cat => {
            container.innerHTML += `<div class="category-header">${cat}</div>`;
            itens.filter(i => i.cat === cat).forEach(item => {
                const idx = itens.indexOf(item);
                container.innerHTML += `<div class="item-row">
                    <div style="display:flex; justify-content:space-between; font-weight:bold;"><span>${item.nome}</span><span onclick="appData.listas[listaAtiva].splice(${idx},1);salvar();renderItens();" style="color:red">🗑️</span></div>
                    <div class="calc-grid"><input type="checkbox" ${item.noCarrinho?'checked':''} onclick="appData.listas[listaAtiva][${idx}].noCarrinho=!appData.listas[listaAtiva][${idx}].noCarrinho;salvar();"><small>PREV</small><div>${item.qtdP}</div><div>${item.valP.toFixed(2)}</div><div style="text-align:right">${(item.qtdP*item.valP).toFixed(2)}</div></div>
                    <div class="calc-grid" style="margin-top:5px;"><div></div><small style="color:var(--s)">REAL</small><input type="number" class="mini-input" value="${item.qtdR}" oninput="appData.listas[listaAtiva][${idx}].qtdR=parseFloat(this.value)||0;salvar();calcularTotais();"><input type="number" class="mini-input" value="${item.valR}" oninput="appData.listas[listaAtiva][${idx}].valR=parseFloat(this.value)||0;salvar();calcularTotais();"><div style="text-align:right; color:var(--s); font-weight:bold;">${(item.qtdR*item.valR).toFixed(2)}</div></div>
                </div>`;
            });
        });
        calcularTotais();
    }

    function calcularTotais() {
        const itens = appData.listas[listaAtiva] || [];
        const tP = itens.reduce((acc, i) => acc + (i.qtdP * i.valP), 0);
        const tR = itens.reduce((acc, i) => acc + (i.qtdR * i.valR), 0);
        document.getElementById('totalPrevisto').innerText = `R$ ${tP.toFixed(2)}`;
        document.getElementById('totalReal').innerText = `R$ ${tR.toFixed(2)}`;
    }

    function abrirModalCatalogo() { 
        document.getElementById('modalCatalogo').style.display = 'flex'; 
        document.getElementById('catCatSelect').innerHTML = appData.categorias.map(c => `<option value="${c}">${c}</option>`).join('');
        renderCatalogo(); 
    }
    function fecharModalCatalogo() { document.getElementById('modalCatalogo').style.display = 'none'; }
    function salvarNoCatalogo() {
        const ean = document.getElementById('catEan').value;
        const nome = document.getElementById('catNome').value;
        if(ean && nome) { appData.catalogo[ean] = { nome, preco: parseFloat(document.getElementById('catPreco').value)||0, categoria: document.getElementById('catCatSelect').value }; salvar(); renderCatalogo(); }
    }
    function renderCatalogo() {
        document.getElementById('listaItensCatalogo').innerHTML = Object.keys(appData.catalogo).map(ean => `<div style="display:flex; justify-content:space-between; padding:8px; border-bottom:1px solid #eee; font-size:0.8rem"><span>${appData.catalogo[ean].nome}</span><span onclick="delete appData.catalogo['${ean}']; salvar(); renderCatalogo();" style="color:red">🗑️</span></div>`).join('');
    }

    function abrirModalCats() { document.getElementById('modalCats').style.display='flex'; renderCatsList(); }
    function renderCatsList() { document.getElementById('listaCategoriasEdicao').innerHTML = appData.categorias.map((c, i) => `<div style="padding:10px; border-bottom:1px solid #eee">${c}</div>`).join(''); }
    function irParaHome() { document.getElementById('screenEditor').classList.remove('active'); document.getElementById('screenHome').classList.add('active'); renderHome(); }
    function renderHome() {
        document.getElementById('listaDeArquivos').innerHTML = Object.keys(appData.listas).map(id => `<div class="list-card" style="background:#fff; border:1px solid #ddd; padding:10px; border-radius:10px; margin-bottom:5px; display:flex; justify-content:space-between"><b onclick="abrirLista('${id}')" style="flex:1">${id}</b><b onclick="if(confirm('Apagar?')){delete appData.listas['${id}']; salvar(); renderHome();}" style="color:red">🗑️</b></div>`).join('');
    }

    function exportarBackup() { prompt("Backup:", btoa(unescape(encodeURIComponent(JSON.stringify(appData))))); }
    function importarBackup() { const c = prompt("Backup:"); if(c){ try { appData=JSON.parse(decodeURIComponent(escape(atob(c)))); salvar(); location.reload(); } catch(e){alert("Erro!");} }}

    renderHome();
</script>
</body>
</html>
