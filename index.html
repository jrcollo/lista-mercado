<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lista VIP - v20 Precision</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
    <style>
        :root { --p: #6366f1; --s: #22c55e; --d: #ef4444; --bg: #f1f5f9; --c: #ffffff; --text: #1e293b; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; display: flex; justify-content: center; }
        .app-container { background: var(--c); padding: 15px; border-radius: 20px; width: 100%; max-width: 600px; min-height: 95vh; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .screen { display: none; } .screen.active { display: block; }
        input, select { padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 16px; width: 100%; margin-bottom: 8px; box-sizing: border-box; }
        .btn { border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-p { background: var(--p); color: white; width: 100%; }
        .btn-scan { background: #334155; color: white; width: 100%; margin-bottom: 10px; }
        .list-card { background: white; border: 1px solid #e2e8f0; padding: 12px; border-radius: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .item-row { border-bottom: 2px solid #f1f5f9; padding: 12px 0; }
        .calc-grid { display: grid; grid-template-columns: 30px 1.2fr 1fr 1fr 1fr; gap: 5px; align-items: center; font-size: 0.8rem; }
        .mini-input { padding: 6px; font-size: 0.85rem; border: 1px solid #e2e8f0; border-radius: 4px; text-align: right; width: 100%; }
        .category-header { background: #e2e8f0; padding: 8px 12px; border-radius: 6px; font-weight: bold; margin-top: 15px; font-size: 0.75rem; text-transform: uppercase; color: #475569; }
        
        /* MODAL SCANNER - CAMADA MÁXIMA */
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); display:none; align-items:center; justify-content:center; z-index:9999; padding: 10px; box-sizing: border-box; }
        .modal-content { background:white; padding:15px; border-radius:15px; width:100%; max-width:450px; position: relative; }
        #interactive.viewport { width: 100%; height: 300px; border-radius: 12px; overflow: hidden; background: #000; position: relative; }
        #interactive.viewport video, canvas { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
        .scanner-laser { position: absolute; top: 50%; left: 10%; width: 80%; height: 2px; background: red; box-shadow: 0 0 8px red; z-index: 10; animation: laser 2s infinite; }
        @keyframes laser { 0%, 100% { top: 30%; } 50% { top: 70%; } }

        .footer-summary { position: sticky; bottom: 0; background: white; padding: 15px; border-top: 2px solid #e2e8f0; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px;}
        .loading { font-size: 0.8rem; color: var(--p); display: none; font-weight: bold; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="screenHome" class="screen active">
        <h2 style="text-align:center">📋 Minhas Listas</h2>
        <div style="display:flex; gap:8px; margin-bottom:20px;">
            <input type="text" id="novaListaNome" placeholder="Ex: Rancho">
            <button class="btn btn-p" onclick="criarNovaLista()" style="width:auto">Criar</button>
        </div>
        <div id="listaDeArquivos"></div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:20px;">
            <button class="btn btn-scan" onclick="abrirModalCatalogo()">📦 Catálogo</button>
            <button class="btn" style="background:#e2e8f0" onclick="abrirModalCats()">⚙️ Categorias</button>
            <button class="btn" style="background:#f1f5f9; font-size: 0.7rem" onclick="exportarBackup()">📤 Backup</button>
            <button class="btn" style="background:#f1f5f9; font-size: 0.7rem" onclick="importarBackup()">📥 Restaurar</button>
        </div>
    </div>

    <div id="screenEditor" class="screen">
        <div style="display:flex; align-items:center; gap:10px; margin-bottom:15px;">
            <button class="btn" onclick="irParaHome()">←</button>
            <h3 id="tituloListaAtual" style="margin:0; flex:1;"></h3>
        </div>
        <div style="background:#f8fafc; padding:15px; border-radius:12px; border:1px solid #e2e8f0; margin-bottom:15px;">
            <button class="btn btn-scan" onclick="iniciarLeitor('lista')">📸 Scanear Produto</button>
            <input type="text" id="prodNome" list="sugestoesProdutos" placeholder="Nome ou EAN..." oninput="autoPreencher(this.value, 'lista')">
            <datalist id="sugestoesProdutos"></datalist>
            <div style="display:grid; grid-template-columns: 1.5fr 1fr 1.2fr; gap:8px;">
                <select id="prodCatSelect"></select>
                <input type="number" id="prodQtdP" placeholder="Qtd" value="1">
                <input type="number" id="prodValP" placeholder="R$ Unit.">
                <button class="btn btn-p" onclick="adicionarItem()" style="grid-column: span 3;">Adicionar à Lista</button>
            </div>
        </div>
        <div id="corpoLista"></div>
        <div class="footer-summary">
            <div style="text-align:center;"><small>PREVISTO</small><br><b id="totalPrevisto">R$ 0.00</b></div>
            <div style="text-align:center; color:var(--s);"><small>REAL</small><br><b id="totalReal">R$ 0.00</b></div>
        </div>
    </div>
</div>

<div id="modalScanner" class="modal">
    <div class="modal-content">
        <div id="interactive" class="viewport">
            <div class="scanner-laser"></div>
        </div>
        <p style="text-align:center; font-size: 12px; color: #666; margin: 10px 0;">Foque no código de barras</p>
        <button class="btn btn-p" onclick="pararLeitor()">Cancelar</button>
    </div>
</div>

<div id="modalCatalogo" class="modal" style="background:rgba(0,0,0,0.8); z-index: 1000;">
    <div class="modal-content" style="max-height: 90vh; overflow-y: auto;">
        <h3>📦 Gestão de Catálogo</h3>
        <button class="btn btn-scan" onclick="iniciarLeitor('catalogo')">📸 Scanear EAN</button>
        <div id="loadingEan" class="loading">🔍 Buscando na internet...</div>
        <div style="background: #f1f5f9; padding: 10px; border-radius: 10px; margin-bottom: 15px;">
            <input type="text" id="catEan" placeholder="Código EAN" oninput="autoPreencher(this.value, 'catalogo')">
            <input type="text" id="catNome" placeholder="Nome do Produto">
            <select id="catCatSelect"></select>
            <input type="number" id="catPreco" placeholder="Preço R$">
            <button class="btn btn-p" onclick="salvarNoCatalogo()">Salvar Item</button>
        </div>
        <div id="listaItensCatalogo"></div>
        <button class="btn" style="width:100%; margin-top:10px; background:#ddd" onclick="fecharModalCatalogo()">Fechar</button>
    </div>
</div>

<div id="modalCats" class="modal" style="background:rgba(0,0,0,0.8); z-index: 1000;">
    <div class="modal-content">
        <h3>⚙️ Categorias</h3>
        <button class="btn btn-p" onclick="addCat()">+ Nova Categoria</button>
        <div id="listaCategoriasEdicao" style="margin-top:15px;"></div>
        <button class="btn" style="width:100%; margin-top:15px; background:#ddd" onclick="document.getElementById('modalCats').style.display='none'">Fechar</button>
    </div>
</div>

<script>
    const KEY = 'app_v15_dados';
    let appData = JSON.parse(localStorage.getItem(KEY)) || {
        listas: {},
        categorias: ["🍎 Hortifruti", "🥩 Açougue", "🧹 Limpeza", "📦 Outros"],
        catalogo: {}
    };

    function salvar() { 
        localStorage.setItem(KEY, JSON.stringify(appData));
        atualizarDatalist();
    }

    function atualizarDatalist() {
        const list = document.getElementById('sugestoesProdutos');
        if(!list) return;
        const nomes = Object.values(appData.catalogo).map(i => i.nome);
        list.innerHTML = [...new Set(nomes)].map(n => `<option value="${n}">`).join('');
    }

    async function buscarEanOnline(ean) {
        if (ean.length < 8) return;
        document.getElementById('loadingEan').style.display = 'block';
        try {
            const response = await fetch(`https://world.openfoodfacts.org/api/v0/product/${ean}.json`);
            const data = await response.json();
            if (data.status === 1) {
                document.getElementById('catNome').value = data.product.product_name || data.product.generic_name || "";
            }
        } catch (e) { console.error("Erro busca"); }
        document.getElementById('loadingEan').style.display = 'none';
    }

    function autoPreencher(valor, contexto) {
        if(!valor) return;
        if(contexto === 'catalogo' && (valor.length === 13 || valor.length === 8)) {
            buscarEanOnline(valor);
        }
        let item = appData.catalogo[valor] || Object.values(appData.catalogo).find(i => i.nome.toLowerCase() === valor.toLowerCase());
        if (item) {
            const eanEncontrado = Object.keys(appData.catalogo).find(key => appData.catalogo[key] === item);
            if (contexto === 'catalogo') {
                document.getElementById('catEan').value = eanEncontrado.startsWith('INT_') ? "" : eanEncontrado;
                document.getElementById('catNome').value = item.nome;
                document.getElementById('catPreco').value = item.preco;
                document.getElementById('catCatSelect').value = item.categoria;
            } else {
                document.getElementById('prodNome').value = item.nome;
                document.getElementById('prodValP').value = item.preco;
                document.getElementById('prodCatSelect').value = item.categoria;
            }
        }
    }

    // --- SCANNER PRECISION v20 ---
    let scanResults = [];
    function iniciarLeitor(alvo) {
        scanResults = [];
        document.getElementById('modalScanner').style.display = 'flex';
        
        Quagga.init({
            inputStream: {
                name: "Live",
                type: "LiveStream",
                target: document.querySelector('#interactive'),
                constraints: { facingMode: "environment" },
            },
            locator: { patchSize: "medium", halfSample: true },
            decoder: { readers: ["ean_reader", "ean_8_reader"] }
        }, (err) => {
            if (err) { alert("Erro câmera"); return; }
            Quagga.start();
        });

        Quagga.onDetected((data) => {
            const code = data.codeResult.code;
            if (code.length < 8) return;

            // Filtro de consistência: precisa ler o mesmo código 3 vezes seguidas
            scanResults.push(code);
            if (scanResults.length >= 3) {
                const count = scanResults.filter(r => r === code).length;
                if (count >= 2) {
                    Quagga.offDetected(); 
                    Quagga.stop();
                    document.getElementById('modalScanner').style.display = 'none';

                    if (alvo === 'catalogo') { 
                        document.getElementById('catEan').value = code; 
                        autoPreencher(code, 'catalogo'); 
                    } else { 
                        autoPreencher(code, 'lista'); 
                    }
                } else {
                    scanResults.shift();
                }
            }
        });
    }

    function pararLeitor() {
        Quagga.offDetected();
        Quagga.stop();
        document.getElementById('modalScanner').style.display = 'none';
    }

    function abrirModalCatalogo() { 
        document.getElementById('modalCatalogo').style.display = 'flex'; 
        document.getElementById('catCatSelect').innerHTML = appData.categorias.map(c => `<option value="${c}">${c}</option>`).join('');
        renderCatalogo(); 
    }
    function fecharModalCatalogo() { document.getElementById('modalCatalogo').style.display = 'none'; }
    
    function salvarNoCatalogo() {
        let ean = document.getElementById('catEan').value.trim();
        const nome = document.getElementById('catNome').value.trim();
        const preco = parseFloat(document.getElementById('catPreco').value) || 0;
        const cat = document.getElementById('catCatSelect').value;
        if (!nome) return;
        if (!ean) ean = "INT_" + nome.toUpperCase().replace(/\s+/g, '_');
        appData.catalogo[ean] = { nome, preco, categoria: cat };
        salvar(); renderCatalogo();
        document.getElementById('catEan').value = ""; document.getElementById('catNome').value = ""; document.getElementById('catPreco').value = "";
    }

    function renderCatalogo() {
        document.getElementById('listaItensCatalogo').innerHTML = Object.keys(appData.catalogo).map(ean => `
            <div style="display:flex; justify-content:space-between; padding:8px; border-bottom:1px solid #eee; font-size:0.8rem">
                <span><b>${appData.catalogo[ean].nome}</b><br><small>${ean.startsWith('INT_') ? '(Sem EAN)' : ean}</small></span>
                <span>
                    <b onclick="autoPreencher('${ean}', 'catalogo')" style="color:var(--p)">✏️</b> | 
                    <b onclick="delete appData.catalogo['${ean}']; salvar(); renderCatalogo();" style="color:red">🗑️</b>
                </span>
            </div>`).join('');
    }

    function abrirModalCats() { document.getElementById('modalCats').style.display='flex'; renderCatsList(); }
    function renderCatsList() {
        document.getElementById('listaCategoriasEdicao').innerHTML = appData.categorias.map((c, i) => `
            <div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #eee">
                <span>${c}</span>
                <span>
                    <b onclick="const n=prompt('Novo nome:', '${c}'); if(n){appData.categorias[${i}]=n; salvar(); renderCatsList();}" style="color:var(--p)">✏️</b> |
                    <b onclick="appData.categorias.splice(${i},1); salvar(); renderCatsList();" style="color:red">🗑️</b>
                </span>
            </div>`).join('');
    }
    function addCat() { const n = prompt("Nome da categoria:"); if(n){appData.categorias.push(n); salvar(); renderCatsList();}}

    let listaAtiva = null;
    function criarNovaLista() {
        const n = document.getElementById('novaListaNome').value.trim();
        if(n) { appData.listas[n] = []; salvar(); abrirLista(n); }
    }
    function abrirLista(id) {
        listaAtiva = id;
        document.getElementById('screenHome').classList.remove('active');
        document.getElementById('screenEditor').classList.add('active');
        document.getElementById('tituloListaAtual').innerText = id;
        document.getElementById('prodCatSelect').innerHTML = appData.categorias.map(c => `<option value="${c}">${c}</option>`).join('');
        atualizarDatalist();
        renderItens();
    }
    function adicionarItem() {
        const nome = document.getElementById('prodNome').value;
        if(!nome) return;
        appData.listas[listaAtiva].push({
            nome, cat: document.getElementById('prodCatSelect').value,
            qtdP: parseFloat(document.getElementById('prodQtdP').value) || 1,
            valP: parseFloat(document.getElementById('prodValP').value) || 0,
            qtdR: parseFloat(document.getElementById('prodQtdP').value) || 1,
            valR: 0, noCarrinho: false
        });
        salvar(); renderItens();
        document.getElementById('prodNome').value = ""; document.getElementById('prodValP').value = "";
    }
    function renderItens() {
        const container = document.getElementById('corpoLista'); container.innerHTML = "";
        const itens = appData.listas[listaAtiva];
        const cats = [...new Set(itens.map(i => i.cat))];
        cats.forEach(cat => {
            container.innerHTML += `<div class="category-header">${cat}</div>`;
            itens.filter(i => i.cat === cat).forEach(item => {
                const idx = itens.indexOf(item);
                container.innerHTML += `
                <div class="item-row">
                    <div style="display:flex; justify-content:space-between; font-weight:bold;">
                        <span>${item.nome}</span>
                        <span onclick="appData.listas[listaAtiva].splice(${idx},1);salvar();renderItens();" style="color:red">🗑️</span>
                    </div>
                    <div class="calc-grid">
                        <input type="checkbox" ${item.noCarrinho?'checked':''} onclick="appData.listas[listaAtiva][${idx}].noCarrinho=!appData.listas[listaAtiva][${idx}].noCarrinho;salvar();">
                        <div style="font-size:0.6rem">PREV.</div><div>${item.qtdP}</div><div>${item.valP.toFixed(2)}</div><div style="text-align:right">${(item.qtdP*item.valP).toFixed(2)}</div>
                    </div>
                    <div class="calc-grid" style="font-weight:bold; margin-top:5px;">
                        <div></div><div style="font-size:0.6rem; color:var(--s)">REAL</div>
                        <div><input type="number" class="mini-input" value="${item.qtdR}" oninput="appData.listas[listaAtiva][${idx}].qtdR=parseFloat(this.value)||0;salvar();calcularTotais();"></div>
                        <div><input type="number" class="mini-input" value="${item.valR}" oninput="appData.listas[listaAtiva][${idx}].valR=parseFloat(this.value)||0;salvar();calcularTotais();"></div>
                        <div style="text-align:right; color:var(--s)">${(item.qtdR*item.valR).toFixed(2)}</div>
                    </div>
                </div>`;
            });
        });
        calcularTotais();
    }
    function calcularTotais() {
        const itens = appData.listas[listaAtiva] || [];
        const tP = itens.reduce((acc, i) => acc + (i.qtdP * i.valP), 0);
        const tR = itens.reduce((acc, i) => acc + (i.qtdR * i.valR), 0);
        document.getElementById('totalPrevisto').innerText = `R$ ${tP.toFixed(2)}`;
        document.getElementById('totalReal').innerText = `R$ ${tR.toFixed(2)}`;
    }

    function irParaHome() { document.getElementById('screenEditor').classList.remove('active'); document.getElementById('screenHome').classList.add('active'); renderHome(); }
    function renderHome() {
        document.getElementById('listaDeArquivos').innerHTML = Object.keys(appData.listas).map(id => `
            <div class="list-card">
                <b onclick="abrirLista('${id}')" style="flex:1">${id}</b>
                <span>
                    <b onclick="const n=prompt('Novo nome:','${id}'); if(n){appData.listas[n]=appData.listas['${id}']; delete appData.listas['${id}']; salvar(); renderHome();}" style="color:var(--p)">✏️</b> | 
                    <b onclick="if(confirm('Apagar?')){delete appData.listas['${id}']; salvar(); renderHome();}" style="color:red">🗑️</b>
                </span>
            </div>`).join('');
    }

    function exportarBackup() { prompt("Copie o backup:", btoa(unescape(encodeURIComponent(JSON.stringify(appData))))); }
    function importarBackup() { const c = prompt("Cole o backup:"); if(c){ appData=JSON.parse(decodeURIComponent(escape(atob(c)))); salvar(); location.reload(); }}

    renderHome();
</script>
</body>
</html>
