<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lista VIP - v29 Master</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
    <style>
        :root { --p: #6366f1; --s: #22c55e; --bg: #f1f5f9; --c: #ffffff; --text: #1e293b; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; display: flex; justify-content: center; }
        .app-container { background: var(--c); padding: 15px; border-radius: 20px; width: 100%; max-width: 600px; min-height: 95vh; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .screen { display: none; } .screen.active { display: block; }
        input, select { padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 16px; width: 100%; margin-bottom: 8px; box-sizing: border-box; }
        .btn { border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; }
        .btn-p { background: var(--p); color: white; width: 100%; }
        .btn-w { background: #25d366; color: white; width: 100%; margin-top: 10px; }
        .btn-scan { background: #334155; color: white; width: 100%; margin-bottom: 10px; }
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:none; align-items:center; justify-content:center; z-index: 10000; }
        .modal-content { background:white; padding:20px; border-radius:15px; width:90%; max-width:450px; position: relative; max-height: 85vh; overflow-y: auto; }
        .item-row { border-bottom: 2px solid #f1f5f9; padding: 12px 0; }
        .category-header { background: #f1f5f9; padding: 8px; border-radius: 6px; font-weight: 800; margin-top: 10px; font-size: 0.8rem; color: var(--p); }
        .calc-grid { display: grid; grid-template-columns: 30px 1.2fr 1fr 1fr 1fr; gap: 5px; align-items: center; font-size: 0.8rem; }
        .mini-input { padding: 6px; font-size: 0.85rem; border: 1px solid #e2e8f0; border-radius: 4px; text-align: right; width: 100%; }
        .footer-summary { position: sticky; bottom: 0; background: white; padding: 15px; border-top: 2px solid #e2e8f0; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; border-radius: 10px 10px 0 0; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="screenHome" class="screen active">
        <h2 style="text-align:center">🛒 Lista VIP</h2>
        <div style="display:flex; gap:8px; margin-bottom:20px;">
            <input type="text" id="novaListaNome" placeholder="Ex: Rancho Mensal">
            <button class="btn btn-p" onclick="criarNovaLista()" style="width:auto">Criar</button>
        </div>
        <div id="listaDeArquivos"></div>
        <hr style="margin:20px 0; opacity:0.2">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <button class="btn btn-scan" onclick="abrirModalCatalogo()" style="grid-column: span 2;">📦 Catálogo de Produtos</button>
            <button class="btn" style="background:#e2e8f0" onclick="abrirModalCats()">⚙️ Categorias</button>
            <button class="btn" style="background:#f1f5f9; color:#64748b" onclick="exportarBackup()">📤 Backup</button>
            <button class="btn" style="background:#f1f5f9; color:#64748b; grid-column: span 2;" onclick="importarBackup()">📥 Restaurar Dados</button>
        </div>
    </div>

    <div id="screenEditor" class="screen">
        <div style="display:flex; align-items:center; gap:10px; margin-bottom:15px;">
            <button class="btn" onclick="irParaHome()">←</button>
            <h3 id="tituloListaAtual" style="margin:0; flex:1;"></h3>
        </div>
        <div style="background:#f8fafc; padding:15px; border-radius:12px; border:1px solid #e2e8f0; margin-bottom:15px;">
            <button class="btn btn-scan" onclick="iniciarLeitor('lista')">📸 Scanear Código</button>
            <input type="number" id="prodEan" placeholder="Código de Barras" oninput="buscarPorEan(this.value, 'lista')">
            
            <input type="text" id="prodNome" list="sugestoes" placeholder="Nome do Produto" oninput="buscarPorNome(this.value)">
            <datalist id="sugestoes"></datalist>

            <div style="display:grid; grid-template-columns: 1.5fr 1fr 1.2fr; gap:8px;">
                <select id="prodCatSelect"></select>
                <input type="number" id="prodQtdP" value="1" placeholder="Qtd">
                <input type="number" id="prodValP" placeholder="R$ Unit.">
                <button class="btn btn-p" onclick="adicionarItem()" style="grid-column: span 3;">Adicionar à Lista</button>
            </div>
        </div>
        <div id="corpoLista"></div>
        <button class="btn btn-w" onclick="compartilharWhatsApp()">Finalizar e Enviar WhatsApp</button>
        <div class="footer-summary">
            <div style="text-align:center;"><small>PREVISTO</small><br><b id="totalPrevisto">R$ 0.00</b></div>
            <div style="text-align:center; color:var(--s);"><small>REAL</small><br><b id="totalReal">R$ 0.00</b></div>
        </div>
    </div>
</div>

<div id="modalScanner" class="modal">
    <div id="interactive" style="width:100%; height:300px; background:#000;"></div>
    <button class="btn" style="position:absolute; bottom:30px; background:red; color:#fff;" onclick="pararLeitor()">Cancelar</button>
</div>

<div id="modalCatalogo" class="modal">
    <div class="modal-content">
        <h3>📦 Catálogo</h3>
        <input type="number" id="catEan" placeholder="EAN" oninput="buscarPorEan(this.value, 'catalogo')">
        <input type="text" id="catNome" placeholder="Nome">
        <select id="catCatSelect"></select>
        <input type="number" id="catPreco" placeholder="Preço R$">
        <button class="btn btn-p" onclick="salvarNoCatalogo()">Salvar Item</button>
        <div id="listaItensCatalogo" style="margin-top:15px;"></div>
        <button class="btn" style="width:100%; margin-top:10px; background:#ddd" onclick="fecharModalCatalogo()">Fechar</button>
    </div>
</div>

<script>
    const KEY = 'app_v29_storage';
    const CATS_PADRAO = ["🛒 Mercearia", "🍎 Hortifruti", "🥩 Açougue", "🥖 Padaria", "🧀 Frios/Laticínios", "❄️ Congelados", "🥤 Bebidas", "🧼 Higiene", "🧹 Limpeza", "🏠 Utilidades Domésticas", "🐾 Pet Shop", "👧 Lanche Crianças", "📦 Outros"];

    let appData = JSON.parse(localStorage.getItem(KEY)) || { listas: {}, categorias: CATS_PADRAO, catalogo: {} };
    let listaAtiva = null;

    function salvar() { 
        localStorage.setItem(KEY, JSON.stringify(appData)); 
        atualizarDatalist();
    }

    // --- AUTOCOMPLETE E BUSCA ---
    function atualizarDatalist() {
        const dl = document.getElementById('sugestoes');
        const nomes = Object.values(appData.catalogo).map(i => i.nome);
        dl.innerHTML = [...new Set(nomes)].map(n => `<option value="${n}">`).join('');
    }

    function buscarPorNome(nome) {
        const item = Object.values(appData.catalogo).find(i => i.nome.toLowerCase() === nome.toLowerCase());
        if(item) {
            document.getElementById('prodValP').value = item.preco;
            document.getElementById('prodCatSelect').value = item.categoria;
        }
    }

    async function buscarPorEan(ean, contexto) {
        const prefix = contexto === 'lista' ? 'prod' : 'cat';
        // Busca local
        if(appData.catalogo[ean]) {
            const item = appData.catalogo[ean];
            document.getElementById(prefix+'Nome').value = item.nome;
            const campoPreco = document.getElementById(prefix+'ValP') || document.getElementById(prefix+'Preco');
            campoPreco.value = item.preco;
            document.getElementById(prefix+'CatSelect').value = item.categoria;
        } 
        // Busca Web
        else if(ean.length === 8 || ean.length === 13) {
            try {
                const res = await fetch(`https://world.openfoodfacts.org/api/v0/product/${ean}.json`);
                const data = await res.json();
                if(data.status === 1) document.getElementById(prefix+'Nome').value = data.product.product_name || "";
            } catch(e){}
        }
    }

    // --- LISTAS ---
    function criarNovaLista() {
        const n = document.getElementById('novaListaNome').value.trim();
        if(n) { appData.listas[n] = []; salvar(); renderHome(); abrirLista(n); }
    }

    function abrirLista(id) {
        listaAtiva = id;
        document.getElementById('screenHome').classList.remove('active');
        document.getElementById('screenEditor').classList.add('active');
        document.getElementById('tituloListaAtual').innerText = id;
        document.getElementById('prodCatSelect').innerHTML = appData.categorias.map(c => `<option value="${c}">${c}</option>`).join('');
        renderItens();
    }

    function adicionarItem() {
        const nome = document.getElementById('prodNome').value;
        if(!nome) return;
        appData.listas[listaAtiva].push({
            nome, ean: document.getElementById('prodEan').value, cat: document.getElementById('prodCatSelect').value,
            qtdP: parseFloat(document.getElementById('prodQtdP').value) || 1,
            valP: parseFloat(document.getElementById('prodValP').value) || 0,
            qtdR: parseFloat(document.getElementById('prodQtdP').value) || 1, valR: 0, noCarrinho: false
        });
        salvar(); renderItens();
        document.getElementById('prodNome').value = ""; document.getElementById('prodEan').value = "";
    }

    function renderItens() {
        const container = document.getElementById('corpoLista'); container.innerHTML = "";
        const itens = appData.listas[listaAtiva] || [];
        const cats = [...new Set(itens.map(i => i.cat))];
        cats.sort().forEach(cat => {
            container.innerHTML += `<div class="category-header">${cat}</div>`;
            itens.filter(i => i.cat === cat).forEach(item => {
                const idx = appData.listas[listaAtiva].indexOf(item);
                container.innerHTML += `
                <div class="item-row">
                    <div style="display:flex; justify-content:space-between; font-weight:bold;"><span>${item.nome}</span><span onclick="appData.listas[listaAtiva].splice(${idx},1);salvar();renderItens();" style="color:red">🗑️</span></div>
                    <div class="calc-grid">
                        <input type="checkbox" ${item.noCarrinho?'checked':''} onclick="appData.listas[listaAtiva][${idx}].noCarrinho=!appData.listas[listaAtiva][${idx}].noCarrinho;salvar();">
                        <small>PREV</small><div>${item.qtdP}</div><div>${item.valP.toFixed(2)}</div><div style="text-align:right">${(item.qtdP*item.valP).toFixed(2)}</div>
                    </div>
                    <div class="calc-grid" style="margin-top:5px;">
                        <div></div><small style="color:var(--s)">REAL</small>
                        <input type="number" class="mini-input" value="${item.qtdR}" oninput="appData.listas[listaAtiva][${idx}].qtdR=parseFloat(this.value)||0;salvar();calcularTotais();">
                        <input type="number" class="mini-input" value="${item.valR}" oninput="appData.listas[listaAtiva][${idx}].valR=parseFloat(this.value)||0;salvar();calcularTotais();">
                        <div style="text-align:right; color:var(--s); font-weight:bold;">${(item.qtdR*item.valR).toFixed(2)}</div>
                    </div>
                </div>`;
            });
        });
        calcularTotais();
    }

    function calcularTotais() {
        const itens = appData.listas[listaAtiva] || [];
        const tP = itens.reduce((acc, i) => acc + (i.qtdP * i.valP), 0);
        const tR = itens.reduce((acc, i) => acc + (i.qtdR * i.valR), 0);
        document.getElementById('totalPrevisto').innerText = `R$ ${tP.toFixed(2)}`;
        document.getElementById('totalReal').innerText = `R$ ${tR.toFixed(2)}`;
    }

    // --- WHATSAPP ---
    function compartilharWhatsApp() {
        const itens = appData.listas[listaAtiva];
        let texto = `🛒 *LISTA: ${listaAtiva.toUpperCase()}*\n\n`;
        itens.forEach(i => {
            texto += `${i.noCarrinho ? '✅' : '⬜'} *${i.nome}*\n   ${i.qtdR}x R$ ${i.valR.toFixed(2)} = *R$ ${(i.qtdR*i.valR).toFixed(2)}*\n`;
        });
        texto += `\n💰 *TOTAL REAL: ${document.getElementById('totalReal').innerText}*`;
        window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(texto)}`);
    }

    // --- MODAIS E HOME ---
    function abrirModalCatalogo() { 
        document.getElementById('modalCatalogo').style.display='flex'; 
        document.getElementById('catCatSelect').innerHTML = appData.categorias.map(c => `<option value="${c}">${c}</option>`).join('');
        renderCatalogo(); 
    }
    function fecharModalCatalogo() { document.getElementById('modalCatalogo').style.display='none'; }
    function salvarNoCatalogo() {
        const ean = document.getElementById('catEan').value || "INT_"+Date.now();
        appData.catalogo[ean] = { 
            nome: document.getElementById('catNome').value, 
            preco: parseFloat(document.getElementById('catPreco').value)||0, 
            categoria: document.getElementById('catCatSelect').value 
        };
        salvar(); renderCatalogo();
    }
    function renderCatalogo() {
        document.getElementById('listaItensCatalogo').innerHTML = Object.keys(appData.catalogo).map(ean => `<div style="display:flex; justify-content:space-between; padding:5px; font-size:12px; border-bottom:1px solid #eee"><span>${appData.catalogo[ean].nome}</span><b onclick="delete appData.catalogo['${ean}']; salvar(); renderCatalogo();" style="color:red">X</b></div>`).join('');
    }

    function irParaHome() { document.getElementById('screenEditor').classList.remove('active'); document.getElementById('screenHome').classList.add('active'); renderHome(); }
    function renderHome() {
        document.getElementById('listaDeArquivos').innerHTML = Object.keys(appData.listas).map(id => `
            <div style="background:#fff; border:1px solid #ddd; padding:12px; border-radius:12px; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center">
                <b onclick="abrirLista('${id}')" style="flex:1">${id}</b>
                <span onclick="if(confirm('Apagar lista?')){delete appData.listas['${id}']; salvar(); renderHome();}" style="color:red; margin-left:15px">🗑️</span>
            </div>`).join('');
    }

    function exportarBackup() { prompt("Copie seu Backup:", btoa(unescape(encodeURIComponent(JSON.stringify(appData))))); }
    function importarBackup() { const b = prompt("Cole seu Backup:"); if(b){ appData=JSON.parse(decodeURIComponent(escape(atob(b)))); salvar(); location.reload(); }}
    
    // Scanner simplificado para não travar
    function iniciarLeitor(a) { alert("Ajustando scanner para próxima versão. Por favor, use digitação por enquanto."); }

    renderHome();
    atualizarDatalist();
</script>
</body>
</html>
